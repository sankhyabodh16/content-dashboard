name: Scrape LinkedIn

on:
  workflow_dispatch:
    inputs:
      creator_id:
        description: 'Specific creator ID to scrape (leave empty for all)'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: node "scraping scripts/linkedin_scraping.js"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          CREATOR_ID: ${{ inputs.creator_id }}
